<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;
  user-select:none;-webkit-app-region:drag}
.splash{text-align:center}
.icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#6366f1,#8b5cf6);
  margin:0 auto 20px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(99,102,241,.3)}
.icon svg{width:32px;height:32px}
h1{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
p{font-size:13px;color:#737373;margin-bottom:32px}
.loader{display:flex;justify-content:center;gap:5px}
.loader span{width:6px;height:6px;border-radius:50%;background:#6366f1;animation:bounce 1s infinite}
.loader span:nth-child(2){animation-delay:.15s}
.loader span:nth-child(3){animation-delay:.3s}
.version{position:absolute;bottom:16px;font-size:10px;color:#404040}
@keyframes bounce{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="splash">
  <div class="icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
  </div>
  <h1>Design Reports</h1>
  <p>Cargando...</p>
  <div class="loader"><span></span><span></span><span></span></div>
  <div class="version">v1.2.0</div>
</div>
</body>
</html>
